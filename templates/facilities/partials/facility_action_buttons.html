<div class="detail-drawer-actions facility-panel-actions">
    <div class="facility-detail-action-grid facility-action-grid-modern">
        <a href="{{ directions_href|default:'#' }}" class="button-secondary facility-action-button{% if not directions_href %} is-disabled{% endif %}"{% if directions_href %} target="_blank" rel="noreferrer"{% endif %}>
            <span class="facility-action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m14 4 7 7-7 7"></path><path d="M21 11H9a4 4 0 0 0-4 4v5"></path><path d="M5 20H3"></path></svg>
            </span>
            <span>Directions</span>
        </a>
        <a href="{{ phone_href|default:'#' }}" class="button-secondary facility-action-button{% if not phone_href %} is-disabled{% endif %}">
            <span class="facility-action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h3l2 5-2 1.5a14 14 0 0 0 5.5 5.5L15 14l5 2v3a2 2 0 0 1-2.2 2A17.8 17.8 0 0 1 3 6.2 2 2 0 0 1 5 4Z"></path></svg>
            </span>
            <span>Call Now</span>
        </a>
        <a href="{{ email_href|default:'#' }}" class="button-secondary facility-action-button{% if not email_href %} is-disabled{% endif %}">
            <span class="facility-action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m4 7 8 6 8-6"></path></svg>
            </span>
            <span>Email</span>
        </a>
        <a href="{{ website_href|default:'#' }}" class="button-secondary facility-action-button{% if not website_href %} is-disabled{% endif %}"{% if website_href %} target="_blank" rel="noreferrer"{% endif %}>
            <span class="facility-action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path><path d="M7 4c-1.7 2-2.7 4.9-2.7 8S5.3 18 7 20"></path><path d="M17 4c1.7 2 2.7 4.9 2.7 8S18.7 18 17 20"></path></svg>
            </span>
            <span>Website</span>
        </a>
    </div>

    <button type="button" class="button-primary facility-action-primary" data-open-facility-modal>
        <span class="facility-action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>
        </span>
        <span>See details</span>
    </button>
</div>
